name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - run: bun install --frozen-lockfile

      # Fetch the model archive from Printables at build time (not stored in the
      # repo). MODELS_ZIP_URL is a repo Actions variable — update it if the
      # Printables CDN link ever rotates.
      - name: Fetch models from Printables
        run: |
          if [ -z "${{ vars.MODELS_ZIP_URL }}" ]; then
            echo "::error::MODELS_ZIP_URL repo variable is not set." && exit 1
          fi
          curl -fsSL "${{ vars.MODELS_ZIP_URL }}" -o /tmp/models.zip
          ./extract.sh /tmp/models.zip

      - run: bunx vite build

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - id: deployment
        uses: actions/deploy-pages@v4
